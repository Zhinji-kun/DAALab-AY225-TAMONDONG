<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAR Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📱 Human Activity Recognition Dashboard</h1>
</header>

<div class="container">

    <h2>Sensor Data</h2>

    <button onclick="loadData()">Load Sample Data</button>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Feature 1</th>
                <th>Feature 2</th>
                <th>Feature 3</th>
                <th>Predicted Activity</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <h2>Activity Stats</h2>
    <div id="stats"></div>

    <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
