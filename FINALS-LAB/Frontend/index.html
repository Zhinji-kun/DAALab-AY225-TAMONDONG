<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HAR Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="container">
    <h1>Human Activity Recognition Dashboard</h1>

    <div class="card">
      <h2>Predict Activity</h2>

      <input id="f1" type="number" step="0.01" placeholder="Feature 1"/>
      <input id="f2" type="number" step="0.01" placeholder="Feature 2"/>
      <input id="f3" type="number" step="0.01" placeholder="Feature 3"/>

      <button onclick="predict()">Predict</button>

      <p id="result"></p>
    </div>

    <div class="card">
      <h2>Activity Summary</h2>
      <button onclick="loadSummary()">Load Summary</button>
      <pre id="summary"></pre>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
    <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
